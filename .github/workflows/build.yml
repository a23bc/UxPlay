name: Build UxPlay (MSYS2 UCRT64)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      # ✅ 安装 Bonjour（Windows 原生）
      - name: Install Bonjour
        run: |
          powershell -Command "choco install bonjour --yes"

      # ✅ 提供 dns_sd.h（关键修复）
      - name: Add Bonjour headers
        run: |
          mkdir -p /ucrt64/include/bonjour
          curl -L -o /ucrt64/include/bonjour/dns_sd.h https://raw.githubusercontent.com/apple-oss-distributions/mDNSResponder/main/mDNSShared/dns_sd.h

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-libplist
            mingw-w64-ucrt-x86_64-gstreamer
            mingw-w64-ucrt-x86_64-gst-plugins-base
            mingw-w64-ucrt-x86_64-gst-plugins-good
            mingw-w64-ucrt-x86_64-gst-plugins-bad
            mingw-w64-ucrt-x86_64-gst-plugins-ugly
            mingw-w64-ucrt-x86_64-gst-libav

      - name: Build
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja \
            -DNO_MARCH_NATIVE=ON \
            -DBONJOUR_INCLUDE_DIR=/ucrt64/include/bonjour \
            -DBONJOUR_LIBRARY="C:/Program Files/Bonjour/Lib/x64/dnssd.lib"
          cmake --build .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uxplay
          path: build/uxplay.exe
