name: Build UxPlay Release (Windows)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      # ✅ 安装 Bonjour runtime（Windows）
      - name: Install Bonjour
        shell: powershell
        run: |
          choco install bonjour --yes

      # ✅ 安装 MSYS2 + 依赖
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-libplist
            mingw-w64-ucrt-x86_64-gstreamer
            mingw-w64-ucrt-x86_64-gst-plugins-base
            mingw-w64-ucrt-x86_64-gst-plugins-good
            mingw-w64-ucrt-x86_64-gst-plugins-bad
            mingw-w64-ucrt-x86_64-gst-plugins-ugly
            mingw-w64-ucrt-x86_64-gst-libav

      # ✅ 伪造 Bonjour SDK（关键！！）
      - name: Fake Bonjour SDK
        run: |
          mkdir -p "/c/Program Files/Bonjour SDK/Include"
          mkdir -p "/c/Program Files/Bonjour SDK/Lib/x64"

          curl -L -o "/c/Program Files/Bonjour SDK/Include/dns_sd.h" \
            https://raw.githubusercontent.com/apple-oss-distributions/mDNSResponder/main/mDNSShared/dns_sd.h

          cp "/c/Program Files/Bonjour/Lib/x64/dnssd.lib" \
            "/c/Program Files/Bonjour SDK/Lib/x64/"

      # ✅ 编译
      - name: Build
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja -DNO_MARCH_NATIVE=ON
          cmake --build .

      # ✅ 打包目录
      - name: Prepare package
        run: |
          mkdir -p package/lib/gstreamer-1.0

          # 主程序
          cp build/uxplay.exe package/

          # 拷贝所有运行时 DLL
          cp /ucrt64/bin/*.dll package/

          # GStreamer 插件
          cp /ucrt64/lib/gstreamer-1.0/*.dll package/lib/gstreamer-1.0/

          # Bonjour runtime（关键）
          cp "/c/Program Files/Bonjour/dnssd.dll" package/

          # 启动脚本
          cat > package/start.bat << 'EOF'
          @echo off
          set GST_PLUGIN_PATH=%~dp0lib\gstreamer-1.0
          set PATH=%~dp0;%PATH%
          uxplay.exe
          pause
          EOF

      # ✅ 打包 zip
      - name: Archive
        shell: powershell
        run: |
          Compress-Archive -Path package\* -DestinationPath uxplay-windows.zip

      # ✅ 上传 artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uxplay-windows
          path: uxplay-windows.zip
