name: build-uxplay-slim

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        install: >
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-ninja
          mingw-w64-ucrt-x86_64-pkg-config
          mingw-w64-ucrt-x86_64-openssl
          mingw-w64-ucrt-x86_64-libplist
          mingw-w64-ucrt-x86_64-gstreamer
          mingw-w64-ucrt-x86_64-gst-plugins-base
          mingw-w64-ucrt-x86_64-gst-plugins-good
          mingw-w64-ucrt-x86_64-gst-libav

    - name: Build
      shell: msys2 {0}
      run: |
        mkdir build
        cd build

        ROOT=$(pwd)/..

        cmake .. -G Ninja \
          -DNO_MARCH_NATIVE=ON \
          -DBONJOUR_INCLUDE_DIR="$ROOT/third_party/bonjour_sdk/Include" \
          -DBONJOUR_LIBRARY="$ROOT/third_party/bonjour_sdk/Lib/x64/dnssd.lib"

        ninja

    - name: Collect minimal runtime
      shell: powershell
      run: |
        mkdir dist

        # 主程序
        copy build\uxplay.exe dist\

        # 只复制必要 DLL（你可以继续删）
        $dlls = @(
          "libgcc_s_seh-1.dll",
          "libstdc++-6.dll",
          "libwinpthread-1.dll",
          "libcrypto-3-x64.dll",
          "libglib-2.0-0.dll",
          "libgobject-2.0-0.dll",
          "libgstreamer-1.0-0.dll",
          "libgstapp-1.0-0.dll",
          "libplist-2.0.dll"
        )

        foreach ($dll in $dlls) {
          Get-ChildItem "C:\msys64\ucrt64\bin\$dll" -ErrorAction SilentlyContinue | Copy-Item -Destination dist\
        }

        # GStreamer 插件（最关键）
        mkdir dist\lib\gstreamer-1.0

        $plugins = @(
          "libgstcoreelements.dll",
          "libgstplayback.dll",
          "libgstlibav.dll",
          "libgstaudioconvert.dll",
          "libgstaudioresample.dll",
          "libgstvideoconvertscale.dll",
          "libgstautodetect.dll"
        )

        foreach ($p in $plugins) {
          Get-ChildItem "C:\msys64\ucrt64\lib\gstreamer-1.0\$p" -ErrorAction SilentlyContinue | Copy-Item -Destination dist\lib\gstreamer-1.0\
        }

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: uxplay-slim
        path: dist
