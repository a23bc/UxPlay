name: Build UxPlay (Slim Version - Safe)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      # ✅ MSYS2
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-libplist
            mingw-w64-ucrt-x86_64-gstreamer
            mingw-w64-ucrt-x86_64-gst-plugins-base
            mingw-w64-ucrt-x86_64-gst-plugins-good
            mingw-w64-ucrt-x86_64-gst-plugins-bad
            mingw-w64-ucrt-x86_64-gst-plugins-ugly
            mingw-w64-ucrt-x86_64-gst-libav

      # ✅ Bonjour SDK（你上传的）
      - name: Install Bonjour SDK
        run: |
          mkdir -p "/c/Program Files/Bonjour SDK/Include"
          mkdir -p "/c/Program Files/Bonjour SDK/Lib/x64"

          cp third_party/bonjour_sdk/Include/dns_sd.h \
            "/c/Program Files/Bonjour SDK/Include/"

          cp third_party/bonjour_sdk/Lib/x64/dnssd.lib \
            "/c/Program Files/Bonjour SDK/Lib/x64/"

      # ✅ 编译
      - name: Build
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja -DNO_MARCH_NATIVE=ON
          cmake --build .

      # 🚀 打包（先全量复制）
      - name: Prepare runtime package
        run: |
          mkdir -p package/lib/gstreamer-1.0

          cp build/uxplay.exe package/
          cp /ucrt64/bin/*.dll package/
          cp /ucrt64/lib/gstreamer-1.0/*.dll package/lib/gstreamer-1.0/

      # 🔥 简单精简（安全删除）
      - name: Simple prune GStreamer plugins
        run: |
          cd package/lib/gstreamer-1.0

          echo "Pruning unnecessary plugins..."

          rm -f libgst*opencv*
          rm -f libgst*cuda*
          rm -f libgst*openni*
          rm -f libgst*webrtc*
          rm -f libgst*rtspserver*
          rm -f libgst*vaapi*
          rm -f libgst*decklink*
          rm -f libgst*spandsp*
          rm -f libgst*assrender*
          rm -f libgst*face*
          rm -f libgst*onnx*
          rm -f libgst*nn*

          echo "Remaining plugin count:"
          ls | wc -l

      # ✅ 启动脚本
      - name: Create launcher
        run: |
          cat > package/start.bat << 'EOF'
          @echo off
          set GST_PLUGIN_PATH=%~dp0lib\gstreamer-1.0
          set PATH=%~dp0;%PATH%
          uxplay.exe
          pause
          EOF

      # ✅ 压缩
      - name: Archive
        shell: powershell
        run: |
          Compress-Archive -Path package\* -DestinationPath uxplay-windows-slim.zip

      # ✅ 上传
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uxplay-windows-slim
          path: uxplay-windows-slim.zip
