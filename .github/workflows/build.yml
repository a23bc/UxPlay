name: Build UxPlay Release (Windows)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      # ✅ 安装 Bonjour runtime（仅用于运行 DLL）
      - name: Install Bonjour
        shell: powershell
        run: |
          choco install bonjour --yes

      # ✅ MSYS2
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-libplist
            mingw-w64-ucrt-x86_64-gstreamer
            mingw-w64-ucrt-x86_64-gst-plugins-base
            mingw-w64-ucrt-x86_64-gst-plugins-good
            mingw-w64-ucrt-x86_64-gst-plugins-bad
            mingw-w64-ucrt-x86_64-gst-plugins-ugly
            mingw-w64-ucrt-x86_64-gst-libav

      # ✅ 编译（直接使用你仓库里的 SDK）
      - name: Build
        run: |
          mkdir build
          cd build

          cmake .. -G Ninja \
            -DNO_MARCH_NATIVE=ON \
            -DBONJOUR_INCLUDE_DIR="${{ github.workspace }}/third_party/bonjour_sdk/Include" \
            -DBONJOUR_LIBRARY="${{ github.workspace }}/third_party/bonjour_sdk/Lib/x64/dnssd.lib"

          cmake --build .

      # ✅ 打包
      - name: Prepare package
        run: |
          mkdir -p package/lib/gstreamer-1.0

          cp build/uxplay.exe package/
          cp /ucrt64/bin/*.dll package/
          cp /ucrt64/lib/gstreamer-1.0/*.dll package/lib/gstreamer-1.0/

          # runtime dll（必须）
          cp "/c/Program Files/Bonjour/dnssd.dll" package/ || true

          cat > package/start.bat << 'EOF'
          @echo off
          set GST_PLUGIN_PATH=%~dp0lib\gstreamer-1.0
          set PATH=%~dp0;%PATH%
          uxplay.exe
          pause
          EOF

      # ✅ zip
      - name: Archive
        shell: powershell
        run: |
          Compress-Archive -Path package\* -DestinationPath uxplay-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uxplay-windows
          path: uxplay-windows.zip
